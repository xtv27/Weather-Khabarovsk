<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Погода в Хабаровске</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #1b2838 0%, #0f172a 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --accent-blue: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .current-weather {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .city-name { font-size: 1.8rem; font-weight: 600; margin-bottom: 5px; }
        .current-date { font-size: 0.95rem; color: var(--text-sub); margin-bottom: 20px; text-transform: capitalize; }
        
        .main-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .current-icon { font-size: 4rem; }
        .current-temp { font-size: 4.5rem; font-weight: 700; line-height: 1; }
        .weather-desc { font-size: 1.15rem; font-weight: 500; color: var(--accent-blue); margin-bottom: 25px; }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .detail-item { text-align: center; }
        .detail-label { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 4px; }
        .detail-value { font-size: 1rem; font-weight: 600; }

        .forecast-section {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 25px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .forecast-list { display: flex; flex-direction: column; gap: 10px; }

        .forecast-row-container {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            overflow: hidden;
            transition: background 0.3s ease;
        }

        .forecast-row {
            display: grid;
            grid-template-columns: 80px 35px 1fr 70px;
            align-items: center;
            padding: 15px 15px;
            cursor: pointer;
        }

        .row-day { font-weight: 500; font-size: 0.95rem; }
        .row-icon { font-size: 1.3rem; text-align: center; }
        .row-desc {
            font-size: 0.9rem;
            color: var(--text-sub);
            padding-left: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .row-temps { text-align: right; font-variant-numeric: tabular-nums; font-size: 0.95rem; }
        .temp-max { font-weight: 600; color: var(--text-main); margin-right: 6px; }
        .temp-min { color: var(--text-sub); }

        .day-details {
            display: none;
            padding: 0 15px 15px 15px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            margin-top: 5px;
            padding-top: 15px;
            animation: fadeIn 0.3s ease forwards;
        }

        .day-details.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .details-extra-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 15px;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 10px;
        }

        .mini-timeline {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .mini-timeline::-webkit-scrollbar { height: 5px; }
        .mini-timeline::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .mini-timeline::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .timeline-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.85rem;
            min-width: 45px;
            flex-shrink: 0;
        }

        .time-label { color: var(--text-sub); margin-bottom: 4px; font-size: 0.8rem;}
        .time-icon { font-size: 1.2rem; margin-bottom: 4px; }
        .time-temp { font-weight: 600; }

        .loading { text-align: center; padding: 40px; color: var(--text-sub); font-size: 1.1rem; }

        @media (max-width: 380px) {
            .forecast-row { grid-template-columns: 65px 30px 1fr 60px; padding: 12px 10px; }
            .row-desc { font-size: 0.8rem; }
            .details-grid { grid-template-columns: 1fr; gap: 15px; }
            .details-extra-info { flex-direction: column; gap: 5px; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="container" id="app-container">
        <div class="loading">Получение прогноза на 7 дней...</div>
    </div>

    <script>
        // Использование стабильного зеркала API для обхода блокировок в РФ
        const apiUrl = 'https://api.open-meteo.com/v1/forecast?latitude=48.48&longitude=135.08&current=temperature_2m,wind_speed_10m,relative_humidity_2m,weather_code&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,wind_speed_10m_max&timezone=Asia%2FVladivostok';

        const weatherMapping = {
            0: { icon: '☀️', text: 'Ясно' },
            1: { icon: '🌤', text: 'Почти ясно' },
            2: { icon: '⛅', text: 'Переменная облачность' },
            3: { icon: '☁️', text: 'Пасмурно' },
            45: { icon: '🌫️', text: 'Туман' },
            48: { icon: '🌫️', text: 'Изморозь' },
            51: { icon: '🌧️', text: 'Морось' },
            53: { icon: '🌧️', text: 'Умеренная морось' },
            55: { icon: '🌧️', text: 'Сильная морось' },
            61: { icon: '🌧️', text: 'Небольшой дождь' },
            63: { icon: '🌧️', text: 'Дождь' },
            65: { icon: '🌧️', text: 'Сильный дождь' },
            71: { icon: '❄️', text: 'Небольшой снег' },
            73: { icon: '❄️', text: 'Снег' },
            75: { icon: '❄️', text: 'Снегопад' },
            77: { icon: '❄️', text: 'Снежные зерна' },
            80: { icon: '🌦️', text: 'Слабый ливень' },
            81: { icon: '🌦️', text: 'Ливень' },
            82: { icon: '⛈️', text: 'Сильный ливень' },
            85: { icon: '🌨️', text: 'Снежный заряд' },
            86: { icon: '🌨️', text: 'Сильный снег' },
            95: { icon: '⛈️', text: 'Гроза' },
            96: { icon: '⛈️', text: 'Гроза с градом' },
            99: { icon: '⛈️', text: 'Сильная гроза' }
        };

        function getWeatherInfo(code) {
            return weatherMapping[code] || { icon: '☁️', text: 'Облачно' };
        }

        const daysOfWeek = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];

        function toggleDay(index) {
            const detailsElement = document.getElementById('details-' + index);
            const isCurrentlyActive = detailsElement.classList.contains('active');

            document.querySelectorAll('.day-details').forEach(el => el.classList.remove('active'));

            if (!isCurrentlyActive) {
                detailsElement.classList.add('active');
                setTimeout(() => {
                    const timeline = detailsElement.querySelector('.mini-timeline');
                    if (timeline) timeline.scrollLeft = 0;
                }, 50);
            }
        }

        async function fetchWeather() {
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error();
                const data = await response.json();
                renderWeather(data);
            } catch (error) {
                document.getElementById('app-container').innerHTML = `
                    <div class="current-weather">
                        <div class="city-name" style="color: #ff8a80;">Ошибка соединения</div>
                        <div class="weather-desc" style="font-size: 1rem; margin-top: 10px;">Провайдер блокирует погодный спутник. Пожалуйста, обновите страницу через пару минут.</div>
                    </div>
                `;
            }
        }

        function renderWeather(data) {
            const current = data.current || {};
            const daily = data.daily || {};
            const hourly = data.hourly || {};
            
            const currentInfo = getWeatherInfo(current.weather_code);
            const todayDate = new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', weekday: 'long' });

            let forecastHtml = '';
            
            // Ровно 7 дней прогноза
            for (let i = 0; i < 7; i++) {
                if (!daily.time || !daily.time[i]) continue;

                const dateObj = new Date(daily.time[i]);
                let dayLabel = daysOfWeek[dateObj.getDay()];
                
                if (i === 0) dayLabel = 'Сегодня';
                if (i === 1) dayLabel = 'Завтра';

                const dayInfo = getWeatherInfo(daily.weather_code[i]);
                const maxT = Math.round(daily.temperature_2m_max[i]);
                const minT = Math.round(daily.temperature_2m_min[i]);
                const maxWind = Math.round(daily.wind_speed_10m_max[i]);

                let hourlyTimelineHtml = '';
                const startHourIndex = i * 24;

                for (let h = 0; h < 24; h++) {
                    const currentHourIndex = startHourIndex + h;
                    const hourTemp = Math.round(hourly.temperature_2m[currentHourIndex]);
                    const hourIcon = getWeatherInfo(hourly.weather_code[currentHourIndex]).icon;
                    const formattedHour = String(h).padStart(2, '0') + ':00';

                    hourlyTimelineHtml += `
                        <div class="timeline-item">
                            <div class="time-label">${formattedHour}</div>
                            <div class="time-icon">${hourIcon}</div>
                            <div class="time-temp">${hourTemp}°</div>
                        </div>
                    `;
                }

                forecastHtml += `
                    <div class="forecast-row-container">
                        <div class="forecast-row" onclick="toggleDay(${i})">
                            <div class="row-day">${dayLabel}</div>
                            <div class="row-icon">${dayInfo.icon}</div>
                            <div class="row-desc">${dayInfo.text}</div>
                            <div class="row-temps">
                                <span class="temp-max">${maxT}°</span>
                                <span class="temp-min">${minT}°</span>
                            </div>
                        </div>
                        
                        <div class="day-details" id="details-${i}">
                            <div class="details-extra-info">
                                <span>💨 Пиковый ветер: ${maxWind} км/ч</span>
                                <span>📍 Хабаровск</span>
                            </div>
                            
                            <div class="mini-timeline">
                                ${hourlyTimelineHtml}
                            </div>
                        </div>
                    </div>
                `;
            }

            const mainStructure = `
                <div class="current-weather">
                    <div class="city-name">Хабаровск</div>
                    <div class="current-date">${todayDate}</div>
                    <div class="main-info">
                        <div class="current-icon">${currentInfo.icon}</div>
                        <div class="current-temp">${Math.round(current.temperature_2m || 0)}°</div>
                    </div>
                    <div class="weather-desc">${currentInfo.text}</div>
                    
                    <div class="details-grid">
                        <div class="detail-item">
                            <div class="detail-label">Ветер</div>
                            <div class="detail-value">${Math.round(current.wind_speed_10m || 0)} км/ч</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Влажность</div>
                            <div class="detail-value">💧 ${current.relative_humidity_2m || 0}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Регион</div>
                            <div class="detail-value">ДВФО</div>
                        </div>
                    </div>
                </div>

                <div class="forecast-section">
                    <div class="section-title">Прогноз на 7 дней</div>
                    <div class="forecast-list">
                        ${forecastHtml}
                    </div>
                </div>
            `;

            document.getElementById('app-container').innerHTML = mainStructure;
        }

        fetchWeather();
    </script>
</body>
</html>
